<!doctype html>
<html lang="de" data-theme="oxid">
  <head>
    <meta charset="utf-8" />
    <title>OxidVault</title>
    <link rel="stylesheet" href="themes.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header-row">
      <h1>OxidVault</h1>
      <select id="themeSelect" class="theme-select" aria-label="Theme">
        <option value="oxid">Oxid Default</option>
        <option value="oxid-light">Oxid Light</option>
        <option value="dracula">Dracula</option>
        <option value="nord">Nord Arctic</option>
      </select>
    </div>

    <p id="subtitle" class="subtitle">Verbindung zum Desktop-Tresor …</p>
    <div id="status" class="status status-unavailable">Status wird geladen …</div>
    <button id="unlockBtn" type="button" class="btn btn-primary" hidden>OxidVault öffnen</button>

    <h2 class="section-title">Generator</h2>
    <section id="generatorPanel" class="generator-panel loading" aria-live="polite">
      <label class="field-label" for="lengthSlider">
        Länge: <span id="lengthValue">24</span>
      </label>
      <input id="lengthSlider" class="range-input" type="range" min="8" max="128" value="24" />

      <div class="charset-grid">
        <label class="charset-option">
          <input id="optUpper" type="checkbox" checked />
          Großbuchstaben
        </label>
        <label class="charset-option">
          <input id="optLower" type="checkbox" checked />
          Kleinbuchstaben
        </label>
        <label class="charset-option">
          <input id="optDigits" type="checkbox" checked />
          Ziffern
        </label>
        <label class="charset-option">
          <input id="optSymbols" type="checkbox" checked />
          Sonderzeichen
        </label>
      </div>

      <input
        id="passwordOutput"
        class="password-output"
        type="text"
        readonly
        aria-label="Generiertes Passwort"
        value=""
      />
      <p id="generatorError" class="generator-error" hidden></p>

      <div class="btn-row">
        <button id="regenerateBtn" type="button" class="btn btn-primary" disabled>
          Neu generieren
        </button>
        <button id="copyBtn" type="button" class="btn btn-secondary" disabled>Kopieren</button>
        <button id="saveBtn" type="button" class="btn btn-secondary" disabled>
          Speichern &amp; AutoFill
        </button>
      </div>
    </section>

    <script type="module" src="popup.js"></script>
  </body>
</html>
