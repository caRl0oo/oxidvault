[package]
edition = "2021"
name = "printpdf"
version = "0.9.1"
authors = [
    "Felix Schütt <felix.schuett@maps4print.com>",
    "Julien Schminke <julien.schminke@web.de",
]
build = false
exclude = [
    "./assets/*",
    "./doc/*",
    "./examples/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust library for reading and writing PDF files"
homepage = "https://github.com/fschutt/printpdf"
readme = "README.md"
keywords = [
    "pdf",
    "gui",
    "graphics",
    "wkhtmltopdf",
]
categories = ["gui"]
license = "MIT"
repository = "https://github.com/fschutt/printpdf"

[package.metadata.docs.rs]
all-features = true

